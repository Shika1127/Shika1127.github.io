<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gravity · Apple Story</title>
    <style>
      :root {
        --screen-left: 19.7%;
        --screen-top: 39.5%;
        --screen-width: 61%;
        --screen-height: 52.9%;
      }

      * { box-sizing: border-box; }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #07170d;
        font-family: ui-rounded, "PingFang TC", system-ui, sans-serif;
      }

      .stage {
        position: relative;
        width: min(100vw, calc(100vh * 1.3333));
        aspect-ratio: 1448 / 1086;
        overflow: hidden;
        isolation: isolate;
        background: #07170d url("assets/newton-apple-frame.png") center / 100% 100% no-repeat;
        box-shadow: 0 24px 70px rgba(0, 0, 0, .55);
      }

      .screen {
        position: absolute;
        left: var(--screen-left);
        top: var(--screen-top);
        width: var(--screen-width);
        height: var(--screen-height);
        overflow: hidden;
        background: #030303;
        z-index: 1;
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }

      .apple-rain {
        position: absolute;
        inset: 0 0 54% 0;
        z-index: 3;
        pointer-events: none;
        overflow: hidden;
      }

      .apple {
        position: absolute;
        top: -18%;
        left: var(--x);
        font-family: "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
        font-size: var(--size);
        line-height: 1;
        filter: drop-shadow(0 5px 3px rgba(0, 0, 0, .48));
        opacity: 0;
        animation: fall var(--duration) var(--delay) infinite cubic-bezier(.2, .72, .3, 1);
      }

      @keyframes fall {
        0% { transform: translate3d(0, -10vh, 0) rotate(0deg) scale(.86); opacity: 0; }
        7% { opacity: 1; }
        72% { opacity: 1; transform: translate3d(var(--drift), 45vh, 0) rotate(500deg) scale(1); }
        78% { transform: translate3d(calc(var(--drift) * 1.08), 42vh, 0) rotate(550deg) scale(.91); }
        88% { opacity: .92; transform: translate3d(calc(var(--drift) * 1.18), 46vh, 0) rotate(630deg) scale(.82); }
        100% { opacity: 0; transform: translate3d(calc(var(--drift) * 1.25), 53vh, 0) rotate(720deg) scale(.72); }
      }

      .hint {
        position: absolute;
        left: 50%;
        bottom: 2.8%;
        z-index: 4;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, .86);
        font-size: clamp(9px, 1.2vw, 15px);
        letter-spacing: .08em;
        text-shadow: 0 2px 5px #000;
        pointer-events: none;
        opacity: .75;
      }

      @media (max-aspect-ratio: 4/3) {
        .stage { width: 100vw; }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="牛頓與蘋果的影片展示">
      <section class="screen" aria-label="影片播放器">
        <video controls autoplay muted loop playsinline preload="metadata">
          <source src="assets/apple-story.mp4" type="video/mp4" />
          您的瀏覽器不支援影片播放。
        </video>
      </section>

      <div class="apple-rain" aria-hidden="true">
        <span class="apple" style="--x:23%; --size:clamp(24px,3.2vw,48px); --duration:5.8s; --delay:-1.4s; --drift:2vw">🍎</span>
        <span class="apple" style="--x:30%; --size:clamp(20px,2.6vw,39px); --duration:7.1s; --delay:-4.8s; --drift:-3vw">🍎</span>
        <span class="apple" style="--x:38%; --size:clamp(25px,3.4vw,51px); --duration:6.5s; --delay:-2.8s; --drift:1vw">🍎</span>
        <span class="apple" style="--x:48%; --size:clamp(21px,2.8vw,42px); --duration:8s; --delay:-6.2s; --drift:4vw">🍎</span>
        <span class="apple" style="--x:57%; --size:clamp(26px,3.6vw,54px); --duration:5.4s; --delay:-.7s; --drift:-2vw">🍎</span>
        <span class="apple" style="--x:65%; --size:clamp(20px,2.7vw,41px); --duration:7.7s; --delay:-5.1s; --drift:3vw">🍎</span>
        <span class="apple" style="--x:73%; --size:clamp(24px,3vw,46px); --duration:6.2s; --delay:-3.5s; --drift:-4vw">🍎</span>
      </div>
      <p class="hint">點擊影片即可播放聲音</p>
    </main>
  </body>
</html>
